<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibrahima THIOYE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">

</head>
<body>
  <nav>
    <span class="nav-logo" onclick="navigate('home')" id="nav-logo">IT</span>
    <ul class="nav-links">
      <li><a href="#" onclick="navigate('home'); return false;" id="nav-home">Accueil</a></li>
      <li><a href="#" onclick="navigate('skills'); return false;" id="nav-skills">Compétences</a></li>
      <li><a href="#" onclick="navigate('projects'); return false;" id="nav-projects">Projets</a></li>
    </ul>
  </nav>

  <div class="page active" id="page-home">
    <section class="home-hero">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-bio" id="hero-bio"></p>
      <div class="hero-actions" id="hero-actions"></div>
    </section>

    <p class="section-label">Formation</p>
    <div class="edu-grid" id="edu-grid"></div>

    <p class="section-label">Certifications</p>
    <div class="cert-list" id="cert-list"></div>

    <p class="section-label">Expérience</p>
    <div class="exp-section">
      <div class="exp-controls">
        <div class="exp-status" id="exp-status"></div>
        <div class="exp-buttons">
          <button class="exp-btn alt" onclick="changeExperience(-1)" aria-label="Expérience précédente">←</button>
          <button class="exp-btn" onclick="changeExperience(1)" aria-label="Expérience suivante">→</button>
        </div>
      </div>
      <div class="exp-view">
        <div class="exp-main" id="exp-main"></div>
        <div class="exp-list" id="exp-list"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-skills">
    <div class="skills-header">
      <h2 class="skills-title">Compétences &<br><em>expertise</em></h2>
    </div>
    <div id="skills-list"></div>
  </div>

  <div class="page" id="page-projects">
    <div class="projects-header">
      <h2 class="projects-title">Projets &<br><em>réalisations</em></h2>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Rechercher un projet…" oninput="filterProjects()" autocomplete="off">
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="projects-grid" id="projects-grid"></div>
  </div>

  <div class="project-modal" id="project-modal" onclick="closeProjectModal(event)">
    <div class="project-modal-card">
      <div class="project-modal-head">
        <div>
          <div class="project-cat" id="modal-subtitle"></div>
          <div class="project-modal-title" id="modal-title"></div>
        </div>
        <button class="project-modal-close" onclick="closeProjectModal(event)">×</button>
      </div>
      <div class="project-modal-content" id="modal-content"></div>
    </div>
  </div>

<script src="data.js"></script>

<script>
function navigate(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-links a').forEach(function(a) { a.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  return false;
}

function goTo(page) {
  navigate(page);
}

function renderHome() {
  document.title = DATA.name.first + ' ' + DATA.name.last;
  document.getElementById('nav-logo').textContent = DATA.name.first[0] + DATA.name.last[0];
  document.getElementById('hero-eyebrow').textContent = DATA.title + ' · ' + DATA.location;
  document.getElementById('hero-name').innerHTML = DATA.name.first + ' <em>' + DATA.name.last + '</em>';
  document.getElementById('hero-bio').textContent = DATA.bio;

  var heroActions = document.getElementById('hero-actions');
  heroActions.innerHTML = DATA.primaryActions.map(function(action) {
    var cls = action.secondary ? 'action-btn secondary' : 'action-btn';
    if (action.href) {
      return '<a class="' + cls + (action.icon ? ' icon-btn' : '') + '" href="' + action.href + '" target="_blank" rel="noreferrer">' + action.label + '</a>';
    }
    return '<button class="' + cls + '" onclick="goTo(\'' + action.action + '\')">' + action.label + '</button>';
  }).join('');

  document.getElementById('edu-grid').innerHTML = DATA.education.map(function(e) {
    return '<div class="edu-card">' +
      '<div class="edu-year">' + e.year + '</div>' +
      '<div class="edu-degree">' + e.degree + '</div>' +
      '<div class="edu-school">' + e.school + '</div>' +
      (e.description ? '<div class="edu-desc">' + e.description + '</div>' : '') +
    '</div>';
  }).join('');

  document.getElementById('cert-list').innerHTML = DATA.certifications.map(function(c) {
    return '<div class="cert-item">' +
      '<div>' +
        '<div class="cert-name">' + c.name + '</div>' +
        '<div class="cert-issuer">' + c.issuer + '</div>' +
        '<div class="cert-actions">' +
          '<a href="' + c.link + '" target="_blank" rel="noreferrer" class="project-link ghost">Voir certification</a>' +
        '</div>' +
      '</div>' +
      '<div class="cert-year">' + c.year + '</div>' +
    '</div>';
  }).join('');

  renderExperience();
}

var currentExperience = 0;

function changeExperience(direction) {
  currentExperience = (currentExperience + direction + DATA.experience.length) % DATA.experience.length;
  renderExperience();
}

function setExperience(index) {
  currentExperience = index;
  renderExperience();
}

function renderExperience() {
  var item = DATA.experience[currentExperience];
  document.getElementById('exp-status').textContent = 'Expérience ' + (currentExperience + 1) + ' / ' + DATA.experience.length;
  document.getElementById('exp-main').innerHTML =
    '<div class="exp-period">' + item.period + '</div>' +
    '<div class="exp-role">' + item.role + '</div>' +
    '<div class="exp-company">' + item.company + '</div>' +
    '<div class="exp-desc">' + item.description + '</div>' +
    '<div class="exp-tags">' + item.tags.map(function(t) { return '<span class="exp-tag">' + t + '</span>'; }).join('') + '</div>';

  document.getElementById('exp-list').innerHTML = DATA.experience.map(function(exp, index) {
    return '<button class="exp-item-btn ' + (index === currentExperience ? 'active' : '') + '" onclick="setExperience(' + index + ')">' +
      '<small>' + exp.period + '</small>' +
      '<strong>' + exp.role + '</strong>' +
      '<span>' + exp.company + '</span>' +
    '</button>';
  }).join('');
}

function renderSkills() {
  var list = document.getElementById('skills-list');
  list.innerHTML = DATA.skills.map(function(cat, ci) {
    return '<div class="skill-category">' +
      '<div class="skill-cat-header open" onclick="toggleCat(' + ci + ', this)">' +
        '<span class="skill-cat-name">' + cat.category + '</span>' +
        '<span style="display:flex;align-items:center;gap:16px">' +
          '<span class="skill-cat-count">' + cat.items.length + ' compétences</span>' +
          '<span class="skill-cat-arrow">›</span>' +
        '</span>' +
      '</div>' +
      '<div class="skill-items open" id="cat-items-' + ci + '">' +
        cat.items.map(function(item) {
          return '<div class="skill-item"><div class="skill-name">' + item + '</div></div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleCat(ci, el) {
  var items = document.getElementById('cat-items-' + ci);
  el.classList.toggle('open');
  items.classList.toggle('open');
}

var activeCategory = 'All';
var activeSubcategory = 'All';

function renderProjects() {
  var filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = '';

  var categoryRow = document.createElement('div');
  categoryRow.className = 'filter-row';
  var categories = ['All'].concat(Object.keys(profileData.filterCategories));

  categories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = function() {
      activeCategory = cat;
      activeSubcategory = 'All';
      renderProjects();
    };
    categoryRow.appendChild(btn);
  });

  filterBar.appendChild(categoryRow);

  if (activeCategory !== 'All' && profileData.filterCategories[activeCategory]) {
    var subcategoryRow = document.createElement('div');
    subcategoryRow.className = 'filter-row';
    var subs = ['All'].concat(profileData.filterCategories[activeCategory]);
    subs.forEach(function(sub) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn' + (sub === activeSubcategory ? ' active' : '');
      btn.textContent = sub;
      btn.onclick = function() {
        activeSubcategory = sub;
        renderProjects();
      };
      subcategoryRow.appendChild(btn);
    });
    filterBar.appendChild(subcategoryRow);
  }

  var grid = document.getElementById('projects-grid');
  var searchInput = document.getElementById('search-input');
  var query = (searchInput && searchInput.value ? searchInput.value : '').toLowerCase();
  grid.innerHTML = '';

  var visible = 0;

  DATA.projects.forEach(function(p) {
    var searchTarget = [p.title, p.description, p.category, p.subcategory].concat(p.stack || []).concat([p.keywords || '']).join(' ').toLowerCase();
    var matchSearch = !query || searchTarget.indexOf(query) !== -1;
    var matchCat = activeCategory === 'All' || p.category === activeCategory;
    var matchSub = activeSubcategory === 'All' || (p.stack || []).indexOf(activeSubcategory) !== -1;

    if (!(matchSearch && matchCat && matchSub)) {
      return;
    }

    visible += 1;

    var card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML =
      '<div class="project-cat">' + p.category + ' · ' + p.subcategory + '</div>' +
      '<div class="project-title">' + (p.icon ? p.icon + ' ' : '') + p.title + '</div>' +
      '<div class="project-desc">' + p.description + '</div>' +
      '<div class="project-stack">' + p.stack.map(function(s) { return '<span class="stack-tag">' + s + '</span>'; }).join('') + '</div>' +
      '<div class="project-links">' + p.links.map(function(l) {
        if (l.modal) {
          return '<a class="project-link ' + (l.kind === 'ghost' ? 'ghost' : '') + '" href="#" onclick="openProjectModal(\'' + l.modal + '\'); return false;">' + l.label + '</a>';
        }
        return '<a class="project-link ' + (l.kind === 'ghost' ? 'ghost' : '') + '" href="' + l.url + '" target="_blank" rel="noreferrer">' + l.label + ' ↗</a>';
      }).join('') + '</div>';

    grid.appendChild(card);
  });

  if (visible === 0) {
    var noResults = document.createElement('p');
    noResults.className = 'no-results visible';
    noResults.textContent = 'Aucun projet ne correspond à votre recherche.';
    grid.appendChild(noResults);
  }
}

function openProjectModal(projectId) {
  var project = profileData.projects.find(function(p) { return p.project_id === projectId; });
  if (!project) return;
  document.getElementById('modal-title').textContent = project.title;
  document.getElementById('modal-subtitle').textContent = project.company;
  document.getElementById('modal-content').innerHTML = project.full_details || '<p>Détails à venir.</p>';
  document.getElementById('project-modal').classList.add('open');
}

function closeProjectModal(event) {
  if (event && event.target && event.target.id !== 'project-modal' && !event.target.classList.contains('project-modal-close')) {
    return;
  }
  document.getElementById('project-modal').classList.remove('open');
}

function filterProjects() {
  renderProjects();
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    document.getElementById('project-modal').classList.remove('open');
  }
});

renderHome();
renderSkills();
renderProjects();
navigate('home');
</script>
</body>
</html>
