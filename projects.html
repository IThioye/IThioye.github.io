<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahima THIOYE - Projects Portfolio</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="data.js"></script>
</head>
<body>
    <div class="mesh-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav>
        <div class="container">
            <div class="nav-container-wrapper">
                <ul class="nav-links">
                    <li><a href="index.html">About</a></li>
                    <li><a href="skills.html">Skills</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li><a href="projects.html">Projects</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <section id="projects" style="padding-top: 10rem;">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Portfolio</span>
                <h2 class="section-title">Projects & Experience</h2>
                <p class="section-subtitle">Filter by domain and specialization</p>
            </div>
            
            <div class="filter-controls">
                <input type="text" id="project-search" class="search-bar" placeholder="Search projects by title, description, or tag...">
                
                <div class="filter-group" id="level-1-filters">
                    </div>
                
                <div class="filter-group" id="level-2-filters">
                    </div>
            </div>
            
            <div class="projects-grid" id="projects-container">
                </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 Ibrahima THIOYE. All rights reserved.</p>
        </div>
    </footer>

    <div id="project-modal" class="modal-backdrop">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <div class="modal-header">
                <div class="project-icon" id="modal-icon"></div>
                <h3 class="project-title" id="modal-title"></h3>
                <p class="project-company" id="modal-company"></p>
                <div class="project-tags" id="modal-tags"></div>
            </div>
            <div class="modal-body" id="modal-details">
                </div>
            <div class="modal-footer" id="modal-cta">
                </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
