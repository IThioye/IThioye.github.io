<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahima THIOYE - Projects Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="data.js"></script>
</head>

<body>
    <div class="mesh-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav>
        <div class="container">
            <div class="nav-container-wrapper">
                <ul class="nav-links">
                    <li><a href="index.html">À propos</a></li>
                    <li><a href="projects.html">Projets</a></li>
                    <li><a href="skills.html">Compétences</a></li>
                    <li><a href="certifications.html">Certifications</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="projects" style="padding-top: 10rem;">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Portfolio</span>
                <h2 class="section-title">Projets & Expériences</h2>
                <p class="section-subtitle">Filtrer par domaine et spécialisation</p>
            </div>

            <div class="filter-controls">
                <input type="text" id="project-search" class="search-bar"
                    placeholder="Rechercher des projets par titre, description ou tag...">

                <div class="filter-group" id="level-1-filters">
                </div>

                <div class="filter-group" id="level-2-filters">
                </div>
            </div>

            <div class="projects-grid" id="projects-container">
            </div>
        </div>
    </section>

    <div id="project-modal" class="modal-backdrop">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <div class="modal-header">
                <div class="project-icon" id="modal-icon"></div>
                <h3 class="project-title" id="modal-title"></h3>
                <p class="project-company" id="modal-company"></p>
                <div class="project-tags" id="modal-tags"></div>
            </div>
            <div class="modal-body" id="modal-details">
            </div>
            <div class="modal-footer" id="modal-cta">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
